name: Release Desktop App

on:
  push:
    tags:
      - "app-v*"

jobs:
  publish-tauri:
    name: Build Windows app
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Prepare release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $config = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $version = $config.version
          $assetDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

          $nsisInstaller = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -File -ErrorAction SilentlyContinue | Select-Object -First 1
          $msiInstaller = Get-ChildItem "src-tauri/target/release/bundle/msi" -Filter "*.msi" -File -ErrorAction SilentlyContinue | Select-Object -First 1

          if (-not $nsisInstaller -and -not $msiInstaller) {
            throw "No Windows installer was found under src-tauri/target/release/bundle."
          }

          if ($nsisInstaller) {
            Copy-Item $nsisInstaller.FullName "$assetDir/GalWriter-AI-v$version-windows-x64-setup.exe"
          }

          if ($msiInstaller) {
            Copy-Item $msiInstaller.FullName "$assetDir/GalWriter-AI-v$version-windows-x64.msi"
          }

          "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"

          gh release create "${{ github.ref_name }}" release-assets/* `
            --title "GalWriter AI v$env:APP_VERSION" `
            --notes "Download the Windows installer from Assets. Use the setup.exe file for the normal installer, or the .msi file if your environment prefers MSI packages. The Source code archives are generated by GitHub and are not the app installer."
