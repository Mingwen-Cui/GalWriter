name: Release Desktop App

on:
  push:
    tags:
      - "app-v*"

jobs:
  publish-tauri:
    name: Build Windows app.exe
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Prepare app.exe asset
        shell: pwsh
        run: |
          $config = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $assetName = "GalWriter-AI-v$($config.version)-windows-x64.exe"
          Copy-Item "src-tauri/target/release/app.exe" $assetName
          "RELEASE_ASSET=$assetName" >> $env:GITHUB_ENV
          "APP_VERSION=$($config.version)" >> $env:GITHUB_ENV

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" "$env:RELEASE_ASSET" `
            --title "GalWriter AI v$env:APP_VERSION" `
            --notes "下载 Assets 中的 $env:RELEASE_ASSET，双击即可运行 GalWriter AI。GitHub 自动附带的 Source code 压缩包不需要下载。"
