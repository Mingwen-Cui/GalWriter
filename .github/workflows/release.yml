name: Release App Assets

on:
  push:
    tags:
      - 'app-v*'

jobs:
  publish-assets:
    name: Build Release Assets
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses and install packages
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          sdkmanager --licenses < $null
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;27.0.12077973" "cmdline-tools;latest"

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Android target
        run: npm run tauri:android:init

      - name: Restore Android signing files
        shell: pwsh
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          $ErrorActionPreference = "Stop"
          if (-not $env:ANDROID_KEYSTORE_BASE64) {
            throw "Missing ANDROID_KEYSTORE_BASE64 secret."
          }

          New-Item -ItemType Directory -Force ".android-signing" | Out-Null
          [IO.File]::WriteAllBytes(".android-signing/galwriter-release.keystore", [Convert]::FromBase64String($env:ANDROID_KEYSTORE_BASE64))

          @"
storeFile=../../../.android-signing/galwriter-release.keystore
storePassword=$env:ANDROID_KEYSTORE_PASSWORD
keyAlias=$env:ANDROID_KEY_ALIAS
keyPassword=$env:ANDROID_KEY_PASSWORD
"@ | Set-Content -Encoding UTF8 "src-tauri/gen/android/key.properties"

      - name: Build all platform release assets
        run: npm run tauri:build:all-platforms

      - name: Prepare release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $config = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $version = $config.version
          $assetDir = "release-assets"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

          $assets = Get-ChildItem "release" -File | Where-Object { $_.Name -like "GalWriter-AI-v$version-*" }
          if (-not $assets) {
            throw "No prepared release assets were found under release/."
          }

          foreach ($asset in $assets) {
            Copy-Item $asset.FullName (Join-Path $assetDir $asset.Name)
          }

          $releaseNotePath = "docs/release-notes/v$version-zh.md"
          if (Test-Path $releaseNotePath) {
            "RELEASE_NOTE_PATH=$releaseNotePath" >> $env:GITHUB_ENV
          } else {
            $fallbackNotePath = "$assetDir/release-notes.md"
            $fallbackNote = @(
              "# GalWriter AI v$version",
              "",
              "Download the release assets from the Assets section. This release may include Windows installers, a web build zip, and Android packages. The Source code archives are generated by GitHub and are not the app binaries."
            ) -join [Environment]::NewLine
            Set-Content -Path $fallbackNotePath -Value $fallbackNote -Encoding UTF8
            "RELEASE_NOTE_PATH=$fallbackNotePath" >> $env:GITHUB_ENV
          }

          "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"

          gh release create "${{ github.ref_name }}" release-assets/* `
            --title "GalWriter AI v$env:APP_VERSION" `
            --notes-file "$env:RELEASE_NOTE_PATH"
